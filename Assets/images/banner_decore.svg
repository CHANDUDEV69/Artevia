<svg width="510" height="510" viewBox="0 0 510 510" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img">
  <defs>
    <!-- subtle luxury gradient -->
    <linearGradient id="arteviaLineGrad" x1="0" y1="0" x2="510" y2="510">
      <stop offset="0" stop-color="#7e3810" stop-opacity="0.25"></stop>
      <stop offset="0.55" stop-color="#fea739" stop-opacity="0.20"></stop>
      <stop offset="1" stop-color="#7e3810" stop-opacity="0.18"></stop>
    </linearGradient>

    <!-- soft glow -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.8" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Main architectural curve -->
  <path d="M50 310 C 95 165, 190 120, 255 165
       C 330 217, 372 128, 460 95" fill="none" stroke="url(#arteviaLineGrad)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"></path>

  <!-- Secondary fine line (adds depth) -->
  <path d="M70 340 C 130 210, 210 175, 270 215
       C 335 258, 392 175, 455 140" fill="none" stroke="#7e3810" stroke-opacity="0.12" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>

  <!-- Minimal “nodes” (design points) -->
  <circle cx="50" cy="310" r="4.5" fill="#7e3810" fill-opacity="0.20"></circle>
  <circle cx="255" cy="165" r="5.5" fill="#fea739" fill-opacity="0.18"></circle>
  <circle cx="460" cy="95" r="4.5" fill="#7e3810" fill-opacity="0.18"></circle>
</svg>